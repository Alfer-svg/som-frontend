name: iOS TestFlight (SOM · Maracatu Digital)

# Build na nuvem do app iOS (Capacitor) do SOM e upload pro TestFlight/App Store Connect.
# Roda com Xcode 26 (SDK iOS 26) no runner macOS. Dispara manualmente ou quando muda algo nativo.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'mobile-shell/**'
      - 'capacitor.config.ts'
      - '.github/workflows/ios-testflight.yml'

jobs:
  build-upload:
    runs-on: macos-15
    env:
      TEAM_ID: YSC69V6L6H
      BUNDLE_ID: com.maracatudigital.som
      PROFILE_NAME: "SOM AppStore"
    steps:
      - uses: actions/checkout@v4

      - name: Selecionar Xcode 26 (SDK iOS 26)
        run: |
          echo "Xcodes disponíveis:"; ls -d /Applications/Xcode*.app
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then echo "::error::Nenhum Xcode 26 no runner"; exit 1; fi
          echo "Usando $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks | grep -i "iphoneos" || true

      - name: Node + Capacitor sync
        run: |
          npm ci
          npx cap sync ios

      - name: CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Importar certificado + perfil de assinatura
        env:
          DIST_P12_BASE64: ${{ secrets.IOS_DIST_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          KCHAIN="$RUNNER_TEMP/build.keychain"
          KPW="ci-pw-$GITHUB_RUN_ID"
          security create-keychain -p "$KPW" "$KCHAIN"
          security set-keychain-settings -lut 21600 "$KCHAIN"
          security unlock-keychain -p "$KPW" "$KCHAIN"
          echo "$DIST_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KCHAIN" -P "$P12_PASSWORD" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KCHAIN"
          security list-keychains -d user -s "$KCHAIN" login.keychain
          echo "Identidades de assinatura:"; security find-identity -v -p codesigning "$KCHAIN"
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROF_DIR"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROF_DIR/profile.mobileprovision"

      - name: Build (assinatura manual)
        working-directory: ios/App
        # Assinatura manual está SÓ no target App (project.pbxproj). NÃO passar flags
        # de signing na linha de comando: vazariam pros targets dos Pods.
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER \
            clean build

      - name: Empacotar IPA
        working-directory: ios/App/build/Build/Products/Release-iphoneos
        run: |
          mkdir Payload
          cp -R App.app Payload/
          zip -qr SOM.ipa Payload
          ls -la SOM.ipa

      - name: Upload para App Store Connect / TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          KEYDIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYDIR"
          echo "$ASC_KEY_BASE64" | base64 --decode > "$KEYDIR/AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app -t ios \
            -f ios/App/build/Build/Products/Release-iphoneos/SOM.ipa \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

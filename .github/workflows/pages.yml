# Deploy do SOM no GitHub Pages via Actions (substitui o build "legacy"/Jekyll,
# que ficava ~20min em "building" e morria em errored a cada push).
name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
# Um deploy por vez, MAS sem cancelar o que está em andamento: cancelar um
# deploy do Pages no meio deixa o ambiente travado e o próximo cai em
# "Deployment failed, try again later". (Recomendação oficial do GitHub Pages.)
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

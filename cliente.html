<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F6F7F9">
  <title>Área do Cliente · Maracatu</title>
  <link rel="icon" href="assets/favicon.png">
  <link rel="manifest" href="cliente-manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    :root{
      /* paleta Google (estilo SOM): superfícies claras, sem preto pesado, sem dourado/roxo */
      --bg:#F6F7F9; --card:#fff; --ink:#202124; --mut:#5F6368; --mut2:#9AA0A6; --line:#E8EAED;
      --blue:#4285F4; --bluebg:#E8F0FE; --blsoft:#F4F8FE;
      --grn:#34A853; --grnbg:#E6F4EA; --grnink:#1E8E4E; --grnsoft:#F3FAF6;
      --amb:#B06000; --amb2:#F9A825; --ambbg:#FEF7E0; --ambsoft:#FEFBEF;
      --red:#EA4335; --redbg:#FCE8E6; --redsoft:#FEF6F4;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:'Roboto',-apple-system,Segoe UI,Arial,sans-serif;-webkit-font-smoothing:antialiased}
    .wrap{max-width:460px;margin:0 auto;min-height:100vh;padding:0 0 90px}
    .muted{color:var(--mut)} .mut2{color:var(--mut2)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(60,64,67,.06)}
    .kpi-label{font-size:10.5px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--mut)}
    .big{font-size:26px;font-weight:500;line-height:1;color:var(--ink)}
    .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:500;font-size:14px;border:none;border-radius:12px;padding:13px 16px;cursor:pointer;transition:filter .12s}
    .btn:active{filter:brightness(.95)}
    .btn-amber{background:var(--blue);color:#fff} .btn-dark{background:var(--blue);color:#fff}
    .btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
    input,textarea{width:100%;font:inherit;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:#fff;outline:none;color:var(--ink)}
    input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(66,133,244,.15)}
    .sec-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue)}
    .sec-title{font-size:18px;font-weight:500;letter-spacing:-.2px;color:var(--ink)}
    /* tabbar — aba ativa VERMELHA (padrão SOM) */
    .tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;z-index:20}
    .tabbar-in{max-width:460px;margin:0 auto;display:flex;width:100%}
    .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 max(9px,env(safe-area-inset-bottom));color:var(--mut);cursor:pointer;font-size:10.5px;font-weight:500}
    .tab.on{color:var(--red)}
    .tab svg{width:22px;height:22px}
    .ring{transform:rotate(-90deg)}
    [x-cloak]{display:none!important}
    /* hero = card CLARO com faixa colorida Google no topo (nada de preto) */
    .hero{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;color:var(--ink);position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(60,64,67,.08)}
    .hero::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#4285F4 0 25%,#EA4335 25% 50%,#F9A825 50% 75%,#34A853 75% 100%)}
    .row{display:flex;align-items:center;gap:10px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:0 1px 2px rgba(60,64,67,.06)}
    .funnel-step{display:flex;flex-direction:column;align-items:center;flex:1}
    .miniava{width:38px;height:38px;border-radius:12px;object-fit:cover;flex:none;background:var(--line)}
    .brand{width:46px;height:46px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:16px;color:#fff;overflow:hidden;border:2px solid #fff;box-shadow:0 1px 5px rgba(60,64,67,.16)}
    a{color:inherit}
  </style>
</head>
<body>
<div class="wrap" x-data="portal()" x-init="init()" x-cloak>

  <!-- ══════════ LOGIN ══════════ -->
  <template x-if="!token">
    <div style="padding:34px 22px">
      <div style="text-align:center;margin:22px 0 26px">
        <img :src="LOGO" alt="Maracatu" style="height:56px;max-width:80%;object-fit:contain" onerror="this.style.display='none'">
        <div class="sec-label" style="margin-top:14px;color:var(--mut)">Área do cliente</div>
        <div class="sec-title" style="margin-top:2px">Bem-vindo de volta</div>
        <div class="muted" style="font-size:13px;margin-top:4px">Acompanhe seus resultados e aprove seu conteúdo.</div>
      </div>
      <div class="card" style="padding:18px">
        <!-- ETAPA 1 · credenciais -->
        <template x-if="etapa==='cred'">
          <div>
            <label class="kpi-label">E-mail</label>
            <input type="email" x-model="lgEmail" placeholder="voce@empresa.com" style="margin:6px 0 14px" @keydown.enter="irParaFoto()">
            <label class="kpi-label">Senha</label>
            <input type="password" x-model="lgSenha" placeholder="sua senha" style="margin:6px 0 4px" @keydown.enter="irParaFoto()">
            <div x-show="lgErro" style="color:var(--red);font-size:13px;margin:8px 0 0" x-text="lgErro"></div>
            <button class="btn btn-amber" style="width:100%;margin-top:16px" @click="irParaFoto()">Continuar</button>
          </div>
        </template>
        <!-- ETAPA 2 · foto + consentimento -->
        <template x-if="etapa==='foto'">
          <div style="text-align:center">
            <div class="kpi-label" style="text-align:left;margin-bottom:10px">Confirme sua identidade</div>
            <div style="position:relative;width:184px;height:236px;margin:0 auto">
              <div style="position:absolute;inset:0;border-radius:50%;overflow:hidden;background:#0b0b0b">
                <video x-ref="cam" autoplay playsinline muted webkit-playsinline style="width:100%;height:100%;object-fit:cover;transform:scaleX(-1)" x-show="!fotoTirada"></video>
                <img :src="fotoData" x-show="fotoTirada" style="width:100%;height:100%;object-fit:cover;transform:scaleX(-1)">
              </div>
              <svg viewBox="0 0 184 236" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none">
                <ellipse cx="92" cy="118" rx="88" ry="114" fill="none" :stroke="(fotoTirada||rostoOk)?'#1E8E4E':'#D5D2CC'" stroke-width="5" :stroke-dasharray="(fotoTirada||rostoOk)?'0':'11 9'" stroke-linecap="round" style="transition:stroke .25s,stroke-dasharray .25s"></ellipse>
              </svg>
            </div>
            <div style="font-size:11.5px;margin-top:9px;font-weight:600" :style="(fotoTirada||rostoOk)?'color:#1E8E4E':'color:var(--mut)'" x-text="fotoTirada?'✓ Foto capturada':(!camPronta?'Abrindo câmera…':(rostoOk?'✓ Rosto enquadrado':'Posicione seu rosto no oval'))"></div>
            <div class="muted" style="font-size:11px;margin-top:3px" x-text="geoOk?'📍 Localização capturada':'📍 Buscando localização…'"></div>
            <label style="display:flex;gap:8px;align-items:flex-start;text-align:left;font-size:11.5px;color:var(--mut);margin-top:12px;line-height:1.45">
              <input type="checkbox" x-model="consentiu" style="margin-top:2px;flex:0 0 16px;width:16px;height:16px;min-width:0">
              <span style="flex:1;min-width:0">Autorizo o registro da minha <b>foto</b>, <b>localização</b> e <b>atividade</b> neste acesso, para a segurança dos dados da empresa (LGPD).</span>
            </label>
            <div x-show="lgErro" style="color:var(--red);font-size:13px;margin:10px 0 0" x-text="lgErro"></div>
            <button x-show="!fotoTirada" class="btn btn-amber" style="width:100%;margin-top:14px" @click="tirarFoto()" :disabled="!camPronta||!(rostoOk||liberaSemRosto)">
              <span x-text="!camPronta?'Abrindo câmera…':((rostoOk||liberaSemRosto)?'Tirar foto':'Enquadre seu rosto')"></span>
            </button>
            <div x-show="fotoTirada" class="row" style="gap:8px;margin-top:14px">
              <button class="btn btn-ghost" style="flex:1" @click="refazerFoto()">Refazer</button>
              <button class="btn btn-amber" style="flex:2" @click="entrar()" :disabled="lgLoading||!consentiu"><span x-text="lgLoading?'Entrando…':'Entrar'"></span></button>
            </div>
            <button class="btn btn-ghost" style="width:100%;margin-top:8px;font-size:12px" @click="voltarCred()">Voltar</button>
          </div>
        </template>
      </div>
      <div class="muted" style="text-align:center;font-size:12px;margin-top:18px">Não tem acesso? Fale com a equipe Maracatu.</div>
    </div>
  </template>

  <!-- ══════════ APP ══════════ -->
  <template x-if="token">
    <div>
      <!-- marca d'água (identidade) + proteção contra captura de tela -->
      <div :style="marcaStyle()" style="position:fixed;inset:0;pointer-events:none;z-index:40"></div>
      <div x-show="alertaCaptura" style="position:fixed;top:0;left:0;right:0;z-index:90;background:#7A0A1C;color:#fff;text-align:center;padding:11px 14px;font-size:13px;font-weight:700;box-shadow:0 2px 12px rgba(0,0,0,.22)">⚠️ Dados sensíveis — este acesso está sendo registrado</div>
      <div x-show="protegido" style="position:fixed;inset:0;z-index:80;background:rgba(247,247,249,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)">
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px">
          <div style="font-size:30px">🔒</div>
          <div style="font-weight:800">Conteúdo protegido</div>
          <div class="muted" style="font-size:12px">Volte para o app para continuar</div>
        </div>
      </div>
      <!-- topo -->
      <div style="padding:16px 18px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div class="row" style="gap:11px;min-width:0">
          <div class="brand" :style="cliente.logo?('background-image:url('+cliente.logo+');background-size:cover;background-position:center'):('background:'+brandBg())"><span x-show="!cliente.logo" x-text="iniciais()"></span></div>
          <div style="min-width:0">
            <div style="font-size:18px;font-weight:800;letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="cliente.empresa||'—'"></div>
            <div class="muted" style="font-size:11px">por Maracatu Digital</div>
          </div>
        </div>
        <button class="btn btn-ghost" style="padding:8px 12px;font-size:12px;flex:none" @click="sair()">Sair</button>
      </div>
      <div style="padding:0 18px 8px;font-size:10.5px;color:var(--mut);display:flex;align-items:center;gap:5px;position:relative;z-index:41"><span>🔒</span><span>Conteúdo confidencial · seu acesso está sendo registrado</span></div>

      <!-- ───── INÍCIO (leitura do dia pela IA) ───── -->
      <div x-show="aba==='inicio'" style="padding:8px 16px">
        <div style="font-size:20px;font-weight:500;letter-spacing:-.3px;margin-bottom:2px;color:var(--ink)" x-text="saudacao()+', '+(cliente.nome||cliente.empresa||'')"></div>
        <div class="muted" style="font-size:13px;margin-bottom:16px" x-text="hojeExtenso()"></div>

        <!-- Leitura do dia (IA) -->
        <div class="hero" style="position:relative;overflow:hidden;margin-bottom:16px">
          <div class="row" style="gap:8px;position:relative;margin-top:2px"><span style="width:16px;height:16px;border-radius:50%;flex:none;background:conic-gradient(#4285F4,#EA4335,#F9A825,#34A853,#4285F4)"></span><span class="sec-label">Leitura do dia · equipe Maracatu</span></div>
          <template x-if="anLoading && !analise.headline"><div style="color:var(--mut);font-size:14px;margin-top:14px">Preparando sua leitura do dia…</div></template>
          <template x-if="analise.headline">
            <div style="position:relative">
              <div style="font-size:20px;font-weight:500;line-height:1.3;margin-top:12px;color:var(--ink)" x-text="analise.headline"></div>
              <div style="font-size:14px;color:var(--mut);line-height:1.65;margin-top:10px" x-text="analise.texto"></div>
              <div style="margin-top:14px;display:grid;gap:8px">
                <template x-for="(dd,i) in (analise.destaques||[])" :key="'an'+i">
                  <div style="font-size:13.5px;border-radius:12px;padding:10px 12px;line-height:1.45;display:flex;gap:9px;align-items:flex-start" :style="destaqueTint(i)"><span :style="'flex:none;width:7px;height:7px;border-radius:50%;margin-top:6px;background:'+destaqueDot(i)"></span><span x-text="dd"></span></div>
                </template>
              </div>
              <button class="btn btn-amber" style="width:100%;margin-top:15px" @click="aba='resultados'; if(!res.cliente) carregarResultados()"><span x-text="analise.convite||'Ver meus resultados'"></span> →</button>
            </div>
          </template>
        </div>

        <!-- atalhos -->
        <div class="sec-label" style="color:var(--mut)">Atalhos</div>
        <div style="display:grid;gap:10px;margin-top:8px">
          <div class="card" style="display:flex;align-items:center;gap:12px;cursor:pointer" @click="aba='conteudo'">
            <div style="width:40px;height:40px;border-radius:12px;background:var(--bluebg);display:flex;align-items:center;justify-content:center;flex:none"><span style="font-size:19px">🗓️</span></div>
            <div style="flex:1"><div style="font-weight:800;font-size:14px">Seu conteúdo da semana</div><div class="muted" style="font-size:12px" x-text="(ap&&ap.disponivel)?(ap.status==='APROVADO_CLIENTE'?'Você já aprovou ✓':'Tem conteúdo pra você aprovar'):'Nada pendente agora'"></div></div>
            <span x-show="ap&&ap.disponivel&&ap.status!=='APROVADO_CLIENTE'" class="pill" style="background:var(--ambbg);color:var(--amb)">aprovar</span>
            <span style="color:var(--mut2)">›</span>
          </div>
          <div class="card" style="display:flex;align-items:center;gap:12px;cursor:pointer" @click="aba='resultados'; if(!res.cliente) carregarResultados()">
            <div style="width:40px;height:40px;border-radius:12px;background:var(--grnbg);display:flex;align-items:center;justify-content:center;flex:none"><span style="font-size:19px">📈</span></div>
            <div style="flex:1"><div style="font-weight:800;font-size:14px">Seus resultados</div><div class="muted" style="font-size:12px">Redes e tráfego, por dentro</div></div>
            <span style="color:var(--mut2)">›</span>
          </div>
          <div class="card" style="display:flex;align-items:center;gap:12px;cursor:pointer" @click="aba='agenda'; if(!agLoaded) carregarAgenda()">
            <div style="width:40px;height:40px;border-radius:12px;background:#F1EDE5;display:flex;align-items:center;justify-content:center;flex:none"><span style="font-size:19px">📅</span></div>
            <div style="flex:1"><div style="font-weight:800;font-size:14px">Próximas ações</div><div class="muted" style="font-size:12px">Reuniões e gravações</div></div>
            <span style="color:var(--mut2)">›</span>
          </div>
        </div>
      </div>

      <!-- ───── CONTEÚDO (aprovar) ───── -->
      <div x-show="aba==='conteudo'" style="padding:8px 16px">
        <div class="sec-label">Conteúdo</div>
        <div class="sec-title" style="margin-bottom:12px">Conteúdo da semana</div>

        <template x-if="apLoading"><div class="muted" style="padding:20px 0;text-align:center">Carregando…</div></template>
        <template x-if="!apLoading && ap && !ap.disponivel">
          <div class="card" style="text-align:center;color:var(--mut)">
            <div style="font-size:30px">🗓️</div>
            <div style="margin-top:6px;font-weight:700;color:var(--ink)">Nada pra aprovar agora</div>
            <div style="font-size:13px;margin-top:2px">Quando a equipe montar sua semana, aparece aqui pra você aprovar.</div>
          </div>
        </template>

        <template x-if="!apLoading && ap && ap.disponivel">
          <div>
            <div class="card" style="margin-bottom:12px">
              <div class="row" style="justify-content:space-between">
                <div>
                  <div class="kpi-label">Semana</div>
                  <div style="font-weight:800;font-size:15px" x-text="fmtSemana(ap.semanaIni, ap.semanaFim)"></div>
                </div>
                <span class="pill" :style="statusStyle(ap.status)" x-text="statusLabel(ap.status)"></span>
              </div>
              <div x-show="ap.observacoes" class="muted" style="font-size:13px;margin-top:10px" x-text="ap.observacoes"></div>
            </div>

            <template x-for="(p,i) in (ap.posts||[])" :key="'ap'+i">
              <div class="card" style="margin-bottom:10px;padding:0;overflow:hidden">
                <img x-show="postImg(p)" :src="postImg(p)" style="width:100%;height:200px;object-fit:cover;display:block" onerror="this.style.display='none'">
                <div style="padding:13px 15px">
                  <div class="row" style="justify-content:space-between">
                    <span class="pill" style="background:var(--bluebg);color:var(--blue)" x-text="p.tipoPost||'Post'"></span>
                    <span class="muted" style="font-size:12px" x-text="fmtDia(p.prazo)"></span>
                  </div>
                  <div style="font-weight:800;margin-top:8px" x-text="p.tema||'—'"></div>
                  <div x-show="p.legenda" class="muted" style="font-size:13px;margin-top:5px;white-space:pre-wrap;line-height:1.5" x-text="p.legenda"></div>
                </div>
              </div>
            </template>

            <!-- estado / ações -->
            <template x-if="ap.status==='APROVADO_CLIENTE'">
              <div class="card" style="background:var(--grnbg);border-color:#BFE6CB;color:var(--grnink);text-align:center;font-weight:700">✓ Você aprovou esta semana<span x-show="ap.aprovadoClienteNome" x-text="' — '+ap.aprovadoClienteNome"></span></div>
            </template>
            <template x-if="ap.status==='AJUSTE'">
              <div class="card" style="background:var(--ambbg);border-color:#F3D89A;color:var(--amb)">
                <b>Ajuste pedido</b><div style="margin-top:4px;font-size:13px;white-space:pre-wrap" x-text="ap.ajusteCliente"></div>
              </div>
            </template>

            <div x-show="ap.status!=='APROVADO_CLIENTE'" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px">
              <button class="btn btn-ghost" @click="ajusteAberto=true">Pedir ajuste</button>
              <button class="btn btn-amber" @click="aprovar()" :disabled="apAcao">Aprovar semana</button>
            </div>

            <div x-show="ajusteAberto" style="margin-top:12px" class="card">
              <label class="kpi-label">O que ajustar?</label>
              <textarea x-model="ajusteTxt" rows="3" placeholder="Descreva o ajuste…" style="margin-top:6px"></textarea>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
                <button class="btn btn-ghost" @click="ajusteAberto=false">Cancelar</button>
                <button class="btn btn-dark" @click="pedirAjuste()" :disabled="apAcao">Enviar ajuste</button>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- ───── RESULTADOS ───── -->
      <div x-show="aba==='resultados'" style="padding:8px 16px">
        <!-- sub-abas -->
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <button class="btn" :class="rTab==='engaj'?'btn-dark':'btn-ghost'" style="flex:1;padding:9px" @click="rTab='engaj'">Redes</button>
          <button class="btn" :class="rTab==='trafego'?'btn-dark':'btn-ghost'" style="flex:1;padding:9px" @click="rTab='trafego'">Tráfego</button>
        </div>

        <template x-if="resLoading"><div class="muted" style="padding:20px 0;text-align:center">Carregando…</div></template>

        <!-- ENGAJAMENTO / REDES -->
        <div x-show="!resLoading && rTab==='engaj'">
          <div class="hero" style="margin-bottom:14px">
            <div class="sec-label">Relatório de redes sociais</div>
            <div class="row" style="justify-content:space-between;align-items:flex-start;margin-top:8px">
              <div style="flex:1">
                <div style="font-size:20px;font-weight:500;color:var(--ink)" x-text="res.cliente||cliente.empresa"></div>
                <div style="font-size:13px;color:var(--mut);margin-top:8px;line-height:1.55" x-html="engajFrase()"></div>
              </div>
              <div style="position:relative;width:86px;height:86px;flex:none">
                <svg width="86" height="86" class="ring">
                  <circle cx="43" cy="43" r="36" stroke="#E8EAED" stroke-width="8" fill="none"/>
                  <circle cx="43" cy="43" r="36" :stroke="saude()>=70?'#34A853':(saude()>=40?'#F9A825':'#EA4335')" stroke-width="8" fill="none" stroke-linecap="round" :stroke-dasharray="226" :stroke-dashoffset="226-226*saude()/100"/>
                </svg>
                <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
                  <div style="font-size:22px;font-weight:500;color:var(--ink)" x-text="saude()+'%'"></div>

                  <div class="stat"><div class="kpi-label">Cliques</div><div class="big" style="margin-top:4px" x-text="nOr(traf.google.cliques)"></div></div>

        </div>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 3-3 3 3 5-5"/></svg><span>Resultados</span>

<script>
  const API = 'https://som-backend-production-01d8.up.railway.app/api';
  const LOGO = 'assets/logo-horizontal.png';
  function portal(){
    return {
      LOGO,
      token: localStorage.getItem('cliente_token') || '',
      cliente: JSON.parse(localStorage.getItem('cliente_info')||'{}'),
      aba:'inicio', rTab:'engaj',
      analise:{}, anLoading:false,
      lgEmail:'', lgSenha:'', lgErro:'', lgLoading:false,
      etapa:'cred', camStream:null, camPronta:false, rostoOk:false, fdTimer:null, liberaSemRosto:false, fotoTirada:false, fotoData:'', lat:null, lng:null, geoOk:false, consentiu:false, hbTimer:null,
      alertaCaptura:false, protegido:false, alertaTimer:null, guardOn:false,
      ap:null, apLoading:false, apAcao:false, ajusteAberto:false, ajusteTxt:'',
      res:{}, resLoading:false, eng:{}, traf:{},
      ag:{}, agLoading:false, agLoaded:false,
      init(){
        this.$watch('aba', v=>this.logAtividade('abriu:'+v));
        this._guardCaptura();
        if(this.token){
          // login direciona o conteúdo: candidato já logado vai pra Central de Campanha
          if((this.cliente&&this.cliente.perfil)==='candidato'){ location.replace('candidato.html'); return; }
          this.aba='inicio'; this.iniciarSessao(); this.carregarAnalise(); this.carregarAprovacoes();
        }
      },
      async api(method, path, body){
        const h={'Content-Type':'application/json'}; if(this.token) h['Authorization']='Bearer '+this.token;
        const r=await fetch(API+path,{method,headers:h,body:body!=null?JSON.stringify(body):undefined});
        if(r.status===401){ this.sair(); throw new Error('Sessão expirada.'); }
        const d=await r.json().catch(()=>null);
        if(!r.ok) throw new Error((d&&d.message)||'Erro'); return d;
      },
      // ── acesso seguro: câmera + geolocalização + consentimento ──
      irParaFoto(){
        this.lgErro='';
        if(!this.lgEmail||!this.lgSenha){ this.lgErro='Preencha e-mail e senha.'; return; }
        this.etapa='foto'; this.fotoTirada=false; this.fotoData=''; this.consentiu=false; this.geoOk=false;
        this.rostoOk=false; this.liberaSemRosto=false;
        this.abrirCamera(); this.pegarLocal();
      },
      async abrirCamera(){
        this.camPronta=false; this.rostoOk=false; this.liberaSemRosto=false;
        let stream;
        try{
          stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:640}},audio:false});
        }catch(e){ this.lgErro='Precisamos da câmera para confirmar sua identidade. Autorize o acesso e tente de novo.'; return; }
        this.camStream=stream;
        await this.$nextTick();
        const v=this.$refs.cam;
        if(!v){ this.lgErro='Não foi possível iniciar a câmera. Tente novamente.'; return; }
        v.setAttribute('playsinline',''); v.setAttribute('muted',''); v.muted=true;
        v.srcObject=stream;
        // iOS Safari às vezes não dispara loadedmetadata sem o play() explícito → várias amarras + fallback
        const pronto=()=>{ if(!this.camPronta){ this.camPronta=true; this.iniciarDeteccao(); } };
        v.onloadedmetadata=pronto; v.oncanplay=pronto; v.onplaying=pronto;
        try{ await v.play(); }catch(e){}
        let t=0; const chk=setInterval(()=>{ if(this.camPronta||this.etapa!=='foto'){ clearInterval(chk); return; } if(v.videoWidth>0){ clearInterval(chk); pronto(); } else if(++t>30){ clearInterval(chk); pronto(); } }, 200);
        // escape: se a detecção não confirmar o rosto em 7s, libera o botão mesmo assim (não trava ninguém)
        setTimeout(()=>{ if(this.etapa==='foto'&&!this.fotoTirada) this.liberaSemRosto=true; }, 7000);
      },
      iniciarDeteccao(){
        if(this.fdTimer) clearInterval(this.fdTimer);
        const cv=document.createElement('canvas'); cv.width=48; cv.height=60; const cx=cv.getContext('2d',{willReadFrequently:true});
        let fd=('FaceDetector' in window)?new window.FaceDetector({fastMode:true,maxDetectedFaces:1}):null;
        let estavel=0, busy=false;
        this.fdTimer=setInterval(async()=>{
          const v=this.$refs.cam;
          if(this.etapa!=='foto'||this.fotoTirada||!v||!v.videoWidth){ return; }
          let ok=false;
          if(fd){
            if(busy) return; busy=true;
            try{ const fs=await fd.detect(v); if(fs&&fs.length){ const b=fs[0].boundingBox; ok=b.width>v.videoWidth*0.22; } }catch(e){ fd=null; }
            busy=false;
          }
          if(!fd){
            // heurística sem FaceDetector (iOS): região central do oval precisa de brilho plausível + detalhe (variação)
            cx.drawImage(v,0,0,cv.width,cv.height);
            let d; try{ d=cx.getImageData(12,10,24,38).data; }catch(e){ return; }
            let n=d.length/4, soma=0, lums=[];
            for(let i=0;i<d.length;i+=4){ const L=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]; lums.push(L); soma+=L; }
            const media=soma/n; let varr=0; for(const L of lums) varr+=(L-media)*(L-media); varr/=n;
            ok = media>42 && media<225 && varr>230;   // rosto centralizado tem brilho médio e textura
          }
          if(ok){ if(++estavel>=2){ this.rostoOk=true; } } else { estavel=0; this.rostoOk=false; }
        }, 350);
      },
      pararDeteccao(){ if(this.fdTimer){ clearInterval(this.fdTimer); this.fdTimer=null; } },
      pegarLocal(){
        if(!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
          p=>{ this.lat=p.coords.latitude; this.lng=p.coords.longitude; this.geoOk=true; },
          ()=>{}, {enableHighAccuracy:true,timeout:8000,maximumAge:60000}
        );
      },
      tirarFoto(){
        const v=this.$refs.cam; if(!v||!this.camPronta) return;
        const lado=Math.min(v.videoWidth,v.videoHeight)||480, size=360;
        const c=document.createElement('canvas'); c.width=size; c.height=size;
        const ctx=c.getContext('2d'); const sx=(v.videoWidth-lado)/2, sy=(v.videoHeight-lado)/2;
        ctx.drawImage(v,sx,sy,lado,lado,0,0,size,size);
        this.fotoData=c.toDataURL('image/jpeg',0.7); this.fotoTirada=true; this.pararDeteccao();
      },
      refazerFoto(){ this.fotoTirada=false; this.fotoData=''; this.rostoOk=false; this.iniciarDeteccao(); },
      pararCamera(){ this.pararDeteccao(); if(this.camStream){ this.camStream.getTracks().forEach(t=>t.stop()); this.camStream=null; } this.camPronta=false; this.rostoOk=false; },
      voltarCred(){ this.pararCamera(); this.etapa='cred'; this.fotoTirada=false; this.fotoData=''; this.lgErro=''; },
      async entrar(){
        this.lgErro='';
        if(!this.fotoData){ this.lgErro='Tire a foto para entrar.'; return; }
        if(!this.consentiu){ this.lgErro='É preciso autorizar o registro para entrar.'; return; }
        this.lgLoading=true;
        try{
          const d=await this.api('POST','/cliente-portal/login',{email:this.lgEmail,senha:this.lgSenha,selfie:this.fotoData,lat:this.lat,lng:this.lng,consent:true});
          this.pararCamera();
          this.token=d.token; this.cliente={...d.cliente, email:this.lgEmail};
          localStorage.setItem('cliente_token',d.token); localStorage.setItem('cliente_info',JSON.stringify(this.cliente));
          this.etapa='cred'; this.lgSenha=''; this.fotoData=''; this.fotoTirada=false;
          // candidato: o painel exclusivo é a Central de Campanha — leva pra lá reusando esta sessão
          if((d.cliente&&d.cliente.perfil)==='candidato'){ location.replace('candidato.html'); return; }
          this.aba='inicio'; this.iniciarSessao(); this.carregarAnalise(); this.carregarAprovacoes();
        }catch(e){ this.lgErro=(e.message||'Não foi possível entrar.'); }
        this.lgLoading=false;
      },
      // ── auditoria da sessão (tempo de uso + atividade) ──
      iniciarSessao(){
        this.logAtividade('abriu:app');
        if(this.hbTimer) clearInterval(this.hbTimer);
        this.hbTimer=setInterval(()=>{ if(this.token && document.visibilityState==='visible') this.api('POST','/cliente-portal/heartbeat').catch(()=>{}); }, 30000);
      },
      logAtividade(acao,meta){ if(!this.token) return; this.api('POST','/cliente-portal/atividade',{acao,meta}).catch(()=>{}); },
      // ── proteção contra captura de tela ──
      // marca d'água diagonal com a identidade de quem está logado (rastreável se vazar print)
      marcaStyle(){
        const xml=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const quem=this.cliente.nome||this.cliente.empresa||'Cliente';
        const email=this.cliente.email||'';
        const dia=new Date().toLocaleDateString('pt-BR');
        const linha=xml(quem+(email?'  '+email:'')+'  '+dia);
        const svg="<svg xmlns='http://www.w3.org/2000/svg' width='330' height='180'><text x='8' y='95' transform='rotate(-22 165 90)' font-family='sans-serif' font-size='12.5' fill='#111' fill-opacity='0.09'>"+linha+"</text></svg>";
        return { backgroundImage:"url(\"data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg)+"\")", backgroundRepeat:'repeat' };
      },
      _guardCaptura(){
        if(this.guardOn) return; this.guardOn=true; const self=this;
        // PrintScreen (desktop) + Cmd+Shift+3/4/5 (macOS) → captura provável
        document.addEventListener('keyup', e=>{ if(self.token && e.key==='PrintScreen') self.capturaDetectada('printscreen'); });
        document.addEventListener('keydown', e=>{ if(self.token && e.metaKey && e.shiftKey && ['Digit3','Digit4','Digit5'].includes(e.code)) self.capturaDetectada('tela-mac'); });
        // sair da tela (troca de app / perda de foco) → borra o conteúdo
        document.addEventListener('visibilitychange', ()=>{ if(self.token) self.protegerTela(document.hidden); });
        window.addEventListener('blur', ()=>{ if(self.token) self.protegerTela(true); });
        window.addEventListener('focus', ()=>{ if(self.token) self.protegerTela(false); });
      },
      capturaDetectada(tipo){
        this.alertaCaptura=true; this.logAtividade('tentou-capturar:'+tipo);
        if(this.alertaTimer) clearTimeout(this.alertaTimer);
        this.alertaTimer=setTimeout(()=>{ this.alertaCaptura=false; }, 4500);
      },
      protegerTela(on){ this.protegido=!!on; },
      async sair(){
        try{ if(this.token) await this.api('POST','/cliente-portal/logout'); }catch(e){}
        if(this.hbTimer){ clearInterval(this.hbTimer); this.hbTimer=null; }
        this.pararCamera();
        this.token=''; localStorage.removeItem('cliente_token'); localStorage.removeItem('cliente_info');
        this.ap=null; this.res={}; this.ag={}; this.agLoaded=false; this.etapa='cred';
      },
      // ── leitura do dia (IA) ──
      async carregarAnalise(){ this.anLoading=true; try{ this.analise=await this.api('GET','/cliente-portal/analise')||{}; }catch(e){} this.anLoading=false; },
      saudacao(){ const h=new Date().getHours(); return h<12?'Bom dia':(h<18?'Boa tarde':'Boa noite'); },
      destaqueTint(i){ const t=[['#F4F8FE','#174EA6'],['#F3FAF6','#12693B'],['#FEFBEF','#8A5A00']]; const c=t[i%3]; return 'background:'+c[0]+';color:'+c[1]; },
      destaqueDot(i){ return ['#4285F4','#34A853','#F9A825'][i%3]; },
      hojeExtenso(){ try{ const s=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'}); return s.charAt(0).toUpperCase()+s.slice(1); }catch(e){ return ''; } },
      // ── aprovações ──
      async carregarAprovacoes(){ this.apLoading=true; try{ this.ap=await this.api('GET','/cliente-portal/aprovacoes'); }catch(e){} this.apLoading=false; },
      async aprovar(){ if(!confirm('Aprovar o conteúdo desta semana?')) return; this.apAcao=true; try{ await this.api('POST','/cliente-portal/aprovacoes/'+this.ap.id+'/aprovar',{nome:this.cliente.nome||''}); this.logAtividade('aprovou:layout',{id:this.ap.id}); await this.carregarAprovacoes(); }catch(e){ alert(e.message); } this.apAcao=false; },
      async pedirAjuste(){ if(!this.ajusteTxt.trim()){ alert('Descreva o ajuste.'); return; } this.apAcao=true; try{ await this.api('POST','/cliente-portal/aprovacoes/'+this.ap.id+'/ajuste',{nome:this.cliente.nome||'',comentario:this.ajusteTxt}); this.logAtividade('pediu-ajuste:layout',{id:this.ap.id}); this.ajusteAberto=false; this.ajusteTxt=''; await this.carregarAprovacoes(); }catch(e){ alert(e.message); } this.apAcao=false; },
      // ── resultados ──
      async carregarResultados(){ this.resLoading=true; try{ this.res=await this.api('GET','/cliente-portal/resultados'); this.eng=this.res.engajamento||{}; this.traf=this.res.trafego||{}; }catch(e){} this.resLoading=false; },
      saude(){ const e=this.eng.engajamentoPct; if(e==null) return 50; const s=Math.round(40+Math.min(e,8)/8*59); return Math.max(20,Math.min(99,s)); },
      engajFrase(){ const e=this.eng; const parts=[]; if(e.engajamentoPct!=null) parts.push('engajamento de <b style="color:#1E8E4E">'+e.engajamentoPct+'%</b>'); if(e.alcance!=null) parts.push('alcançando <b style="color:#174EA6">'+this.nMil(e.alcance)+' pessoas</b>'); return parts.length? ('Seu perfil manteve '+parts.join(', ')+' no período.') : 'Seus números aparecem aqui quando a equipe sincronizar suas redes.'; },
      redesLista(){ const r=this.eng.redes||{}; const out=[]; const ig=r.instagram, fb=r.facebook, gg=r.google;
        if(ig) out.push({nome:'Instagram',ico:'📸',linhas:[['Seguidores',this.nOr(ig.seguidores)],['Engajamento',ig.score!=null?ig.score+'%':(this.eng.engajamentoPct!=null?this.eng.engajamentoPct+'%':'—')]]});
        if(fb) out.push({nome:'Facebook',ico:'👍',linhas:[['Seguidores',this.nOr(fb.seguidores)],['Alcance',this.nOr(fb.alcance)]]});
        if(gg) out.push({nome:'Google · Perfil',ico:'🌐',linhas:[['Avaliação',gg.score!=null?gg.score+' ★':'—']]});
        return out; },
      tMet(k){ const m=this.traf.meta||{}, g=this.traf.google||{}; const a=m[k], b=g[k]; if(a!=null&&b!=null) return a+b; return a!=null?a:(b!=null?b:null); },
      // ── agenda ──
      async carregarAgenda(){ this.agLoading=true; try{ this.ag=await this.api('GET','/cliente-portal/agenda'); this.agLoaded=true; }catch(e){} this.agLoading=false; },
      // ── helpers ──
      iniciais(){ const s=(this.cliente.empresa||'').trim(); if(!s) return '—'; const ps=s.split(/\s+/).filter(w=>w.length>1||/[A-Za-zÀ-ÿ]/.test(w)); const a=(ps[0]||s)[0]||''; const b=ps.length>1?(ps[1][0]||''):(s[1]||''); return (a+b).toUpperCase(); },
      brandBg(){ const s=this.cliente.empresa||''; let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; const cores=['#E0742A','#1F9D57','#2F6FED','#7C3AED','#DB2777','#0D9488','#CA8A04','#C0392E','#0891B2','#4F46E5']; return cores[h%cores.length]; },
      nOr(v){ return (v==null||v==='')?'—':Number(v).toLocaleString('pt-BR'); },
      nMil(v){ if(v==null) return '—'; v=Number(v); if(v>=1000000) return (Math.round(v/100000)/10).toLocaleString('pt-BR')+' mi'; if(v>=1000) return (Math.round(v/100)/10).toLocaleString('pt-BR')+' mil'; return v.toLocaleString('pt-BR'); },
      fmtDia(d){ if(!d) return ''; const[a,m,dd]=String(d).slice(0,10).split('-'); return dd+'/'+m; },
      diaN(d){ return String(d||'').slice(8,10); },
      mesN(d){ const m=+String(d||'').slice(5,7); return ['','JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'][m]||''; },
      fmtSemana(a,b){ return this.fmtDia(a)+' a '+this.fmtDia(b); },
      postImg(p){ const c=(Array.isArray(p.criativos)&&p.criativos[0])||p.criativo; return (c&&/^https?:/.test(c))?c:''; },
      statusLabel(s){ return {ENVIADO:'Aguardando você',APROVADO_CLIENTE:'Aprovado',AJUSTE:'Ajuste pedido'}[s]||s; },
      statusStyle(s){ return s==='APROVADO_CLIENTE'?'background:var(--grnbg);color:var(--grnink)':(s==='AJUSTE'?'background:var(--ambbg);color:var(--amb)':'background:var(--bluebg);color:var(--blue)'); },
    };
  }
</script>

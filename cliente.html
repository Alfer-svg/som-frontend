<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#141210">
  <title>Área do Cliente · Maracatu</title>
  <link rel="icon" href="assets/favicon.png">
  <link rel="manifest" href="cliente-manifest.json">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    :root{
      --bg:#F4F0E9; --card:#fff; --ink:#211F1A; --mut:#8A887E; --mut2:#B4B1A6; --line:#ECE7DD;
      --amber:#E0742A; --amber2:#F4A420; --grn:#1F9D57; --grnbg:#E8F6EC; --grnink:#1A7A43;
      --amb:#E08A00; --ambbg:#FCF1D8; --red:#D6453F; --redbg:#FBE6E5; --blue:#2F6FED; --bluebg:#EAF1FE;
      --dark:#1C1A17;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
    .wrap{max-width:460px;margin:0 auto;min-height:100vh;padding:0 0 90px}
    .muted{color:var(--mut)} .mut2{color:var(--mut2)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
    .kpi-label{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--mut)}
    .big{font-size:26px;font-weight:800;line-height:1}
    .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:14px;border:none;border-radius:12px;padding:13px 16px;cursor:pointer}
    .btn-amber{background:var(--amber);color:#fff} .btn-dark{background:var(--dark);color:#fff}
    .btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
    input,textarea{width:100%;font:inherit;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:#fff;outline:none;color:var(--ink)}
    input:focus,textarea:focus{border-color:var(--amber)}
    .sec-label{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--amber)}
    .sec-title{font-size:18px;font-weight:800;letter-spacing:-.2px}
    /* tabbar */
    .tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;z-index:20}
    .tabbar-in{max-width:460px;margin:0 auto;display:flex;width:100%}
    .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 max(9px,env(safe-area-inset-bottom));color:var(--mut);cursor:pointer;font-size:10.5px;font-weight:700}
    .tab.on{color:var(--amber)}
    .tab svg{width:22px;height:22px}
    .ring{transform:rotate(-90deg)}
    [x-cloak]{display:none!important}
    .hero{background:var(--dark);border-radius:18px;padding:18px;color:#fff;position:relative;overflow:hidden}
    .row{display:flex;align-items:center;gap:10px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px}
    .divider{height:1px;background:var(--line);margin:0}
    .funnel-step{display:flex;flex-direction:column;align-items:center;flex:1}
    .bar{height:8px;border-radius:6px;background:var(--line);overflow:hidden}
    .bar>i{display:block;height:100%;border-radius:6px}
    .miniava{width:38px;height:38px;border-radius:12px;object-fit:cover;flex:none;background:var(--line)}
    a{color:inherit}
  </style>
</head>
<body>
<div class="wrap" x-data="portal()" x-init="init()" x-cloak>

  <!-- ══════════ LOGIN ══════════ -->
  <template x-if="!token">
    <div style="padding:34px 22px">
      <div style="text-align:center;margin:22px 0 26px">
        <img :src="LOGO" alt="Maracatu" style="height:34px" onerror="this.style.display='none'">
        <div class="sec-label" style="margin-top:14px;color:var(--mut)">Área do cliente</div>
        <div class="sec-title" style="margin-top:2px">Bem-vindo de volta</div>
        <div class="muted" style="font-size:13px;margin-top:4px">Acompanhe seus resultados e aprove seu conteúdo.</div>
      </div>
      <div class="card" style="padding:18px">
        <label class="kpi-label">E-mail</label>
        <input type="email" x-model="lgEmail" placeholder="voce@empresa.com" style="margin:6px 0 14px" @keydown.enter="entrar()">
        <label class="kpi-label">Senha</label>
        <input type="password" x-model="lgSenha" placeholder="sua senha" style="margin:6px 0 4px" @keydown.enter="entrar()">
        <div x-show="lgErro" style="color:var(--red);font-size:13px;margin:8px 0 0" x-text="lgErro"></div>
        <button class="btn btn-amber" style="width:100%;margin-top:16px" @click="entrar()" :disabled="lgLoading">
          <span x-text="lgLoading?'Entrando…':'Entrar'"></span>
        </button>
      </div>
      <div class="muted" style="text-align:center;font-size:12px;margin-top:18px">Não tem acesso? Fale com a equipe Maracatu.</div>
    </div>
  </template>

  <!-- ══════════ APP ══════════ -->
  <template x-if="token">
    <div>
      <!-- topo -->
      <div style="padding:16px 18px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div>
          <div class="sec-label" style="color:var(--mut)">Maracatu · seu painel</div>
          <div style="font-size:19px;font-weight:800;letter-spacing:-.3px" x-text="cliente.empresa||'—'"></div>
        </div>
        <button class="btn btn-ghost" style="padding:8px 12px;font-size:12px" @click="sair()">Sair</button>
      </div>

      <!-- ───── CONTEÚDO (aprovar) ───── -->
      <div x-show="aba==='conteudo'" style="padding:8px 16px">
        <div class="sec-label">Conteúdo</div>
        <div class="sec-title" style="margin-bottom:12px">Conteúdo da semana</div>

        <template x-if="apLoading"><div class="muted" style="padding:20px 0;text-align:center">Carregando…</div></template>
        <template x-if="!apLoading && ap && !ap.disponivel">
          <div class="card" style="text-align:center;color:var(--mut)">
            <div style="font-size:30px">🗓️</div>
            <div style="margin-top:6px;font-weight:700;color:var(--ink)">Nada pra aprovar agora</div>
            <div style="font-size:13px;margin-top:2px">Quando a equipe montar sua semana, aparece aqui pra você aprovar.</div>
          </div>
        </template>

        <template x-if="!apLoading && ap && ap.disponivel">
          <div>
            <div class="card" style="margin-bottom:12px">
              <div class="row" style="justify-content:space-between">
                <div>
                  <div class="kpi-label">Semana</div>
                  <div style="font-weight:800;font-size:15px" x-text="fmtSemana(ap.semanaIni, ap.semanaFim)"></div>
                </div>
                <span class="pill" :style="statusStyle(ap.status)" x-text="statusLabel(ap.status)"></span>
              </div>
              <div x-show="ap.observacoes" class="muted" style="font-size:13px;margin-top:10px" x-text="ap.observacoes"></div>
            </div>

            <template x-for="(p,i) in (ap.posts||[])" :key="'ap'+i">
              <div class="card" style="margin-bottom:10px;padding:0;overflow:hidden">
                <img x-show="postImg(p)" :src="postImg(p)" style="width:100%;height:200px;object-fit:cover;display:block" onerror="this.style.display='none'">
                <div style="padding:13px 15px">
                  <div class="row" style="justify-content:space-between">
                    <span class="pill" style="background:var(--bluebg);color:var(--blue)" x-text="p.tipoPost||'Post'"></span>
                    <span class="muted" style="font-size:12px" x-text="fmtDia(p.prazo)"></span>
                  </div>
                  <div style="font-weight:800;margin-top:8px" x-text="p.tema||'—'"></div>
                  <div x-show="p.legenda" class="muted" style="font-size:13px;margin-top:5px;white-space:pre-wrap;line-height:1.5" x-text="p.legenda"></div>
                </div>
              </div>
            </template>

            <!-- estado / ações -->
            <template x-if="ap.status==='APROVADO_CLIENTE'">
              <div class="card" style="background:var(--grnbg);border-color:#BFE6CB;color:var(--grnink);text-align:center;font-weight:700">✓ Você aprovou esta semana<span x-show="ap.aprovadoClienteNome" x-text="' — '+ap.aprovadoClienteNome"></span></div>
            </template>
            <template x-if="ap.status==='AJUSTE'">
              <div class="card" style="background:var(--ambbg);border-color:#F3D89A;color:var(--amb)">
                <b>Ajuste pedido</b><div style="margin-top:4px;font-size:13px;white-space:pre-wrap" x-text="ap.ajusteCliente"></div>
              </div>
            </template>

            <div x-show="ap.status!=='APROVADO_CLIENTE'" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px">
              <button class="btn btn-ghost" @click="ajusteAberto=true">Pedir ajuste</button>
              <button class="btn btn-amber" @click="aprovar()" :disabled="apAcao">Aprovar semana</button>
            </div>

            <div x-show="ajusteAberto" style="margin-top:12px" class="card">
              <label class="kpi-label">O que ajustar?</label>
              <textarea x-model="ajusteTxt" rows="3" placeholder="Descreva o ajuste…" style="margin-top:6px"></textarea>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
                <button class="btn btn-ghost" @click="ajusteAberto=false">Cancelar</button>
                <button class="btn btn-dark" @click="pedirAjuste()" :disabled="apAcao">Enviar ajuste</button>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- ───── RESULTADOS ───── -->
      <div x-show="aba==='resultados'" style="padding:8px 16px">
        <!-- sub-abas -->
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <button class="btn" :class="rTab==='engaj'?'btn-dark':'btn-ghost'" style="flex:1;padding:9px" @click="rTab='engaj'">Redes</button>
          <button class="btn" :class="rTab==='trafego'?'btn-dark':'btn-ghost'" style="flex:1;padding:9px" @click="rTab='trafego'">Tráfego</button>
        </div>

        <template x-if="resLoading"><div class="muted" style="padding:20px 0;text-align:center">Carregando…</div></template>

        <!-- ENGAJAMENTO / REDES -->
        <div x-show="!resLoading && rTab==='engaj'">
          <div class="hero" style="margin-bottom:14px">
            <div class="sec-label" style="color:#C9A24B">Relatório de redes sociais</div>
            <div class="row" style="justify-content:space-between;align-items:flex-start;margin-top:8px">
              <div style="flex:1">
                <div style="font-size:20px;font-weight:800" x-text="res.cliente||cliente.empresa"></div>
                <div style="font-size:13px;color:#B9B4AA;margin-top:8px;line-height:1.5" x-html="engajFrase()"></div>
              </div>
              <div style="position:relative;width:86px;height:86px;flex:none">
                <svg width="86" height="86" class="ring">
                  <circle cx="43" cy="43" r="36" stroke="#3a3733" stroke-width="8" fill="none"/>
                  <circle cx="43" cy="43" r="36" :stroke="saude()>=70?'#37c26e':(saude()>=40?'#f0b13a':'#e06a5f')" stroke-width="8" fill="none" stroke-linecap="round" :stroke-dasharray="226" :stroke-dashoffset="226-226*saude()/100"/>
                </svg>
                <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
                  <div style="font-size:22px;font-weight:800" x-text="saude()+'%'"></div>
                  <div style="font-size:7.5px;letter-spacing:.05em;color:#9a968f;text-transform:uppercase">saúde</div>
                </div>
              </div>
            </div>
          </div>

          <div class="sec-label" style="color:var(--mut)">A semana em números</div>
          <div class="grid2" style="margin:8px 0 16px">
            <div class="stat"><div class="kpi-label">Seguidores</div><div class="big" style="margin-top:5px" x-text="nOr(eng.seguidores)"></div></div>
            <div class="stat"><div class="kpi-label">Engajamento</div><div class="big" style="margin-top:5px;color:var(--grnink)" x-text="eng.engajamentoPct!=null?(eng.engajamentoPct+'%'):'—'"></div></div>
            <div class="stat"><div class="kpi-label">Pessoas alcançadas</div><div class="big" style="margin-top:5px" x-text="nOr(eng.alcance)"></div></div>
            <div class="stat"><div class="kpi-label">Conteúdos</div><div class="big" style="margin-top:5px" x-text="nOr(eng.conteudos)"></div></div>
          </div>

          <div class="sec-label" style="color:var(--mut)">Suas redes</div>
          <div style="display:grid;gap:10px;margin-top:8px">
            <template x-for="rd in redesLista()" :key="rd.nome">
              <div class="card" style="padding:14px">
                <div class="row" style="gap:8px;margin-bottom:8px"><span style="font-size:16px" x-text="rd.ico"></span><b x-text="rd.nome"></b></div>
                <template x-for="ln in rd.linhas" :key="ln[0]">
                  <div class="row" style="justify-content:space-between;padding:5px 0;border-top:1px solid var(--line)"><span class="muted" style="font-size:13px" x-text="ln[0]"></span><b x-text="ln[1]"></b></div>
                </template>
              </div>
            </template>
          </div>
          <div class="muted" style="font-size:11px;text-align:center;margin-top:14px" x-text="res.atualizadoEm?('Atualizado em '+fmtDia(res.atualizadoEm)):'Os números aparecem quando a equipe sincroniza suas redes.'"></div>
        </div>

        <!-- TRÁFEGO -->
        <div x-show="!resLoading && rTab==='trafego'">
          <template x-if="!traf.meta && !traf.google">
            <div class="card" style="text-align:center;color:var(--mut)"><div style="font-size:30px">📈</div><div style="margin-top:6px;font-weight:700;color:var(--ink)">Sem campanhas ativas</div><div style="font-size:13px;margin-top:2px">Quando houver tráfego pago rodando, seu resultado aparece aqui.</div></div>
          </template>
          <template x-if="traf.meta || traf.google">
            <div>
              <!-- funil -->
              <div class="hero" style="background:linear-gradient(135deg,#1f6feb,#0e3f8f);margin-bottom:14px">
                <div class="sec-label" style="color:#bcd3ff">Resultado do período</div>
                <div style="display:flex;align-items:center;gap:8px;margin:14px 0">
                  <div class="funnel-step"><div style="font-size:19px;font-weight:800" x-text="nMil(tMet('impressoes'))"></div><div style="font-size:9px;color:#cfe0ff;text-transform:uppercase;letter-spacing:.04em">impressões</div></div>
                  <div style="color:#9fc0ff">→</div>
                  <div class="funnel-step"><div style="font-size:19px;font-weight:800" x-text="nOr(tMet('cliques'))"></div><div style="font-size:9px;color:#cfe0ff;text-transform:uppercase;letter-spacing:.04em">cliques</div></div>
                  <div style="color:#9fc0ff">→</div>
                  <div class="funnel-step"><div style="font-size:19px;font-weight:800" x-text="nOr(tMet('leads'))"></div><div style="font-size:9px;color:#cfe0ff;text-transform:uppercase;letter-spacing:.04em">contatos</div></div>
                </div>
                <div class="row" style="gap:8px;flex-wrap:wrap">
                  <span class="pill" style="background:rgba(255,255,255,.16);color:#fff" x-text="'R$ '+nOr(tMet('gasto'))+' investidos'"></span>
                  <span class="pill" style="background:rgba(255,255,255,.16);color:#fff" x-show="tMet('custoLead')!=null" x-text="'R$ '+tMet('custoLead')+' por contato'"></span>
                </div>
              </div>

              <!-- Meta Ads -->
              <div x-show="traf.meta" class="card" style="margin-bottom:12px">
                <div class="row" style="gap:8px;margin-bottom:12px"><span style="font-size:16px">📣</span><b>Meta Ads · Instagram + Facebook</b></div>
                <div class="grid2">
                  <div class="stat"><div class="kpi-label">Alcance</div><div class="big" style="margin-top:4px" x-text="nMil(traf.meta.alcance)"></div></div>
                  <div class="stat"><div class="kpi-label">Impressões</div><div class="big" style="margin-top:4px" x-text="nMil(traf.meta.impressoes)"></div></div>
                  <div class="stat"><div class="kpi-label">Cliques</div><div class="big" style="margin-top:4px" x-text="nOr(traf.meta.cliques)"></div></div>
                  <div class="stat"><div class="kpi-label">CPC médio</div><div class="big" style="margin-top:4px" x-text="traf.meta.cpcMedio!=null?('R$ '+traf.meta.cpcMedio):'—'"></div></div>
                </div>
                <template x-if="(traf.meta.campanhas||[]).length">
                  <div style="margin-top:12px">
                    <div class="kpi-label" style="margin-bottom:6px">Campanhas</div>
                    <template x-for="(cp,i) in traf.meta.campanhas.slice(0,5)" :key="'cp'+i">
                      <div class="row" style="justify-content:space-between;padding:7px 0;border-top:1px solid var(--line)">
                        <span style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="cp.nome||cp.name||('Campanha '+(i+1))"></span>
                        <span class="muted" style="font-size:12px;flex:none" x-text="(cp.cliques!=null?cp.cliques+' cliques':'')"></span>
                      </div>
                    </template>
                  </div>
                </template>
              </div>

              <!-- Google Ads -->
              <div x-show="traf.google" class="card">
                <div class="row" style="gap:8px;margin-bottom:12px"><span style="font-size:16px">🔍</span><b>Google Ads</b></div>
                <div class="grid2">
                  <div class="stat"><div class="kpi-label">Conversões</div><div class="big" style="margin-top:4px" x-text="nOr(traf.google.conversoes ?? traf.google.leads)"></div></div>
                  <div class="stat"><div class="kpi-label">Cliques</div><div class="big" style="margin-top:4px" x-text="nOr(traf.google.cliques)"></div></div>
                  <div class="stat"><div class="kpi-label">Impressões</div><div class="big" style="margin-top:4px" x-text="nMil(traf.google.impressoes)"></div></div>
                  <div class="stat"><div class="kpi-label">Investimento</div><div class="big" style="margin-top:4px" x-text="traf.google.gasto!=null?('R$ '+nOr(traf.google.gasto)):'—'"></div></div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- ───── AGENDA ───── -->
      <div x-show="aba==='agenda'" style="padding:8px 16px">
        <div class="sec-label">Agenda</div>
        <div class="sec-title" style="margin-bottom:12px">Próximas ações</div>
        <template x-if="agLoading"><div class="muted" style="padding:20px 0;text-align:center">Carregando…</div></template>
        <template x-if="!agLoading && !(ag.reunioes||[]).length && !(ag.gravacoes||[]).length">
          <div class="card" style="text-align:center;color:var(--mut)"><div style="font-size:30px">📅</div><div style="margin-top:6px;font-weight:700;color:var(--ink)">Nada agendado</div><div style="font-size:13px;margin-top:2px">Reuniões e gravações marcadas aparecem aqui.</div></div>
        </template>
        <template x-if="(ag.reunioes||[]).length">
          <div style="margin-bottom:16px">
            <div class="kpi-label" style="margin-bottom:8px">Reuniões</div>
            <template x-for="(e,i) in ag.reunioes" :key="'ag'+i">
              <div class="card" style="margin-bottom:8px;display:flex;gap:12px;align-items:center">
                <div style="text-align:center;width:44px;flex:none"><div style="font-size:16px;font-weight:800" x-text="diaN(e.data)"></div><div class="mut2" style="font-size:9px;font-weight:800;text-transform:uppercase" x-text="mesN(e.data)"></div></div>
                <div style="flex:1;min-width:0"><div style="font-weight:700" x-text="e.titulo"></div><div class="muted" style="font-size:12px" x-text="[e.hora, e.nota].filter(Boolean).join(' · ')"></div></div>
              </div>
            </template>
          </div>
        </template>
        <template x-if="(ag.gravacoes||[]).length">
          <div>
            <div class="kpi-label" style="margin-bottom:8px">Gravações</div>
            <template x-for="(g,i) in ag.gravacoes" :key="'gv'+i">
              <div class="card" style="margin-bottom:8px;display:flex;gap:12px;align-items:center">
                <div style="text-align:center;width:44px;flex:none"><div style="font-size:16px;font-weight:800" x-text="diaN(g.data)"></div><div class="mut2" style="font-size:9px;font-weight:800;text-transform:uppercase" x-text="mesN(g.data)"></div></div>
                <div style="flex:1;min-width:0"><div style="font-weight:700" x-text="g.tipo"></div><div class="muted" style="font-size:12px" x-text="g.local"></div></div>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- tabbar -->
      <div class="tabbar"><div class="tabbar-in">
        <div class="tab" :class="aba==='conteudo'?'on':''" @click="aba='conteudo'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="m9 12 2 2 4-4"/></svg><span>Conteúdo</span>
        </div>
        <div class="tab" :class="aba==='resultados'?'on':''" @click="aba='resultados'; if(!res.cliente) carregarResultados()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 3-3 3 3 5-5"/></svg><span>Resultados</span>
        </div>
        <div class="tab" :class="aba==='agenda'?'on':''" @click="aba='agenda'; if(!agLoaded) carregarAgenda()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>Agenda</span>
        </div>
      </div></div>
    </div>
  </template>
</div>

<script>
  const API = 'https://som-backend-production-01d8.up.railway.app/api';
  const LOGO = 'assets/logo-horizontal.png';
  function portal(){
    return {
      LOGO,
      token: localStorage.getItem('cliente_token') || '',
      cliente: JSON.parse(localStorage.getItem('cliente_info')||'{}'),
      aba:'conteudo', rTab:'engaj',
      lgEmail:'', lgSenha:'', lgErro:'', lgLoading:false,
      ap:null, apLoading:false, apAcao:false, ajusteAberto:false, ajusteTxt:'',
      res:{}, resLoading:false, eng:{}, traf:{},
      ag:{}, agLoading:false, agLoaded:false,
      init(){ if(this.token) this.carregarAprovacoes(); },
      async api(method, path, body){
        const h={'Content-Type':'application/json'}; if(this.token) h['Authorization']='Bearer '+this.token;
        const r=await fetch(API+path,{method,headers:h,body:body!=null?JSON.stringify(body):undefined});
        if(r.status===401){ this.sair(); throw new Error('Sessão expirada.'); }
        const d=await r.json().catch(()=>null);
        if(!r.ok) throw new Error((d&&d.message)||'Erro'); return d;
      },
      async entrar(){
        this.lgErro=''; if(!this.lgEmail||!this.lgSenha){ this.lgErro='Preencha e-mail e senha.'; return; }
        this.lgLoading=true;
        try{
          const d=await this.api('POST','/cliente-portal/login',{email:this.lgEmail,senha:this.lgSenha});
          this.token=d.token; this.cliente=d.cliente;
          localStorage.setItem('cliente_token',d.token); localStorage.setItem('cliente_info',JSON.stringify(d.cliente));
          this.aba='conteudo'; this.carregarAprovacoes();
        }catch(e){ this.lgErro=(e.message||'Não foi possível entrar.'); }
        this.lgLoading=false;
      },
      sair(){ this.token=''; localStorage.removeItem('cliente_token'); localStorage.removeItem('cliente_info'); this.ap=null; this.res={}; this.ag={}; this.agLoaded=false; },
      // ── aprovações ──
      async carregarAprovacoes(){ this.apLoading=true; try{ this.ap=await this.api('GET','/cliente-portal/aprovacoes'); }catch(e){} this.apLoading=false; },
      async aprovar(){ if(!confirm('Aprovar o conteúdo desta semana?')) return; this.apAcao=true; try{ await this.api('POST','/cliente-portal/aprovacoes/'+this.ap.id+'/aprovar',{nome:this.cliente.nome||''}); await this.carregarAprovacoes(); }catch(e){ alert(e.message); } this.apAcao=false; },
      async pedirAjuste(){ if(!this.ajusteTxt.trim()){ alert('Descreva o ajuste.'); return; } this.apAcao=true; try{ await this.api('POST','/cliente-portal/aprovacoes/'+this.ap.id+'/ajuste',{nome:this.cliente.nome||'',comentario:this.ajusteTxt}); this.ajusteAberto=false; this.ajusteTxt=''; await this.carregarAprovacoes(); }catch(e){ alert(e.message); } this.apAcao=false; },
      // ── resultados ──
      async carregarResultados(){ this.resLoading=true; try{ this.res=await this.api('GET','/cliente-portal/resultados'); this.eng=this.res.engajamento||{}; this.traf=this.res.trafego||{}; }catch(e){} this.resLoading=false; },
      saude(){ const e=this.eng.engajamentoPct; if(e==null) return 50; const s=Math.round(40+Math.min(e,8)/8*59); return Math.max(20,Math.min(99,s)); },
      engajFrase(){ const e=this.eng; const parts=[]; if(e.engajamentoPct!=null) parts.push('engajamento de <b style="color:#f3c05a">'+e.engajamentoPct+'%</b>'); if(e.alcance!=null) parts.push('alcançando <b style="color:#8fb7ff">'+this.nMil(e.alcance)+' pessoas</b>'); return parts.length? ('Seu perfil manteve '+parts.join(', ')+' no período.') : 'Seus números aparecem aqui quando a equipe sincronizar suas redes.'; },
      redesLista(){ const r=this.eng.redes||{}; const out=[]; const ig=r.instagram, fb=r.facebook, gg=r.google;
        if(ig) out.push({nome:'Instagram',ico:'📸',linhas:[['Seguidores',this.nOr(ig.seguidores)],['Engajamento',ig.score!=null?ig.score+'%':(this.eng.engajamentoPct!=null?this.eng.engajamentoPct+'%':'—')]]});
        if(fb) out.push({nome:'Facebook',ico:'👍',linhas:[['Seguidores',this.nOr(fb.seguidores)],['Alcance',this.nOr(fb.alcance)]]});
        if(gg) out.push({nome:'Google · Perfil',ico:'🌐',linhas:[['Avaliação',gg.score!=null?gg.score+' ★':'—']]});
        return out; },
      tMet(k){ const m=this.traf.meta||{}, g=this.traf.google||{}; const a=m[k], b=g[k]; if(a!=null&&b!=null) return a+b; return a!=null?a:(b!=null?b:null); },
      // ── agenda ──
      async carregarAgenda(){ this.agLoading=true; try{ this.ag=await this.api('GET','/cliente-portal/agenda'); this.agLoaded=true; }catch(e){} this.agLoading=false; },
      // ── helpers ──
      nOr(v){ return (v==null||v==='')?'—':Number(v).toLocaleString('pt-BR'); },
      nMil(v){ if(v==null) return '—'; v=Number(v); return v>=1000?(Math.round(v/100)/10).toLocaleString('pt-BR')+' mil':v.toLocaleString('pt-BR'); },
      fmtDia(d){ if(!d) return ''; const[a,m,dd]=String(d).slice(0,10).split('-'); return dd+'/'+m; },
      diaN(d){ return String(d||'').slice(8,10); },
      mesN(d){ const m=+String(d||'').slice(5,7); return ['','JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'][m]||''; },
      fmtSemana(a,b){ return this.fmtDia(a)+' a '+this.fmtDia(b); },
      postImg(p){ const c=(Array.isArray(p.criativos)&&p.criativos[0])||p.criativo; return (c&&/^https?:/.test(c))?c:''; },
      statusLabel(s){ return {ENVIADO:'Aguardando você',APROVADO_CLIENTE:'Aprovado',AJUSTE:'Ajuste pedido'}[s]||s; },
      statusStyle(s){ return s==='APROVADO_CLIENTE'?'background:var(--grnbg);color:var(--grnink)':(s==='AJUSTE'?'background:var(--ambbg);color:var(--amb)':'background:var(--bluebg);color:var(--blue)'); },
    };
  }
</script>
</body>
</html>

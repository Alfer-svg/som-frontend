<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Maracatu · Área do Cliente</title>
  <style>
    html, body { margin: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center;
           background: #F4F0E9; color: #141210; text-align: center; padding: 24px; box-sizing: border-box; }
    .logo { width: 92px; height: 92px; border-radius: 24px; background: #fff; box-shadow: 0 8px 28px rgba(0,0,0,.10);

    .logo svg { width: 60px; height: 60px; }
    h1 { font-size: 20px; margin: 22px 0 8px; font-weight: 800; }
    p { color: #6b6560; font-size: 14px; max-width: 280px; line-height: 1.55; }
    button { margin-top: 22px; background: #141210; border: 0; color: #fff; font-weight: 700;
             padding: 13px 30px; border-radius: 13px; font-size: 15px; }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#141210" stroke-width="1.6">
      <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5.2"/><circle cx="12" cy="12" r="1.6" fill="#141210"/>
    </svg>
  </div>
  <h1>Sem conexão</h1>
  <p>Não foi possível carregar a Área do Cliente. Verifique sua internet e tente novamente.</p>
  <button onclick="location.reload()">Tentar de novo</button>

</html>

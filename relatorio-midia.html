<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Mídia · SOM</title>
<link rel="icon" href="assets/favicon.png">
<style>
  :root{
    --ink:#17140f; --ink2:#3b4048; --mut:#6c7480; --mut2:#9aa0aa;
    --line:#E7E2D6; --hair:#EEEAE0; --page:#F5F2EB; --paper:#FFFFFF; --soft:#FBF9F3;
    --red:#E8402E; --yellow:#F4B400; --green:#1E9E4F; --blue:#3B7DD8; --ink-blue:#2b5fa8;
    --blue-w:#EAF1FB; --green-w:#E7F4EC; --yellow-w:#FCF2D6; --red-w:#FCEAE7;
    --measure:62ch;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--page);color:var(--ink);
    font-family:"Avenir Next","Segoe UI",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.55;font-size:15px}
  b{font-weight:700}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}

  /* ── toolbar (não sai no PDF) ── */
  .bar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:11px 22px;background:rgba(245,242,235,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .bar img{height:22px;display:block}
  .bar .ctl{display:flex;align-items:center;gap:10px}
  .bar input[type=month]{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 10px;
    font:inherit;font-size:13px;font-weight:600;color:var(--ink2)}
  .btn{border:0;cursor:pointer;font:inherit;font-weight:700;font-size:13.5px;padding:10px 18px;border-radius:11px;
    background:var(--ink);color:#fff;display:inline-flex;align-items:center;gap:8px}
  .btn svg{width:16px;height:16px}
  .btn[disabled]{opacity:.5;cursor:default}

  /* ── estados ── */
  .estado{max-width:560px;margin:80px auto;text-align:center;color:var(--mut)}
  .estado b{color:var(--ink);display:block;font-size:18px;margin-bottom:8px}
  .spin{width:34px;height:34px;border:3px solid var(--hair);border-top-color:var(--ink);border-radius:50%;
    margin:0 auto 18px;animation:g 0.9s linear infinite}
  @keyframes g{to{transform:rotate(360deg)}}

  /* ── documento ── */
  .doc{max-width:860px;margin:0 auto;padding:0 26px 70px}
  .sheet{background:var(--paper);border:1px solid var(--line);border-radius:4px;
    box-shadow:0 1px 2px rgba(20,18,15,.03),0 24px 60px -30px rgba(20,18,15,.22);
    padding:52px 54px;margin-top:26px}

  /* ── capa ── */
  .cover .logo{height:52px;margin-bottom:44px;display:block}
  .eyebrow{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--mut)}
  .cover h1{font-size:clamp(32px,5.4vw,52px);line-height:1.04;letter-spacing:-.035em;font-weight:800;
    margin:16px 0 0;text-wrap:balance;max-width:15ch}
  .cover h1 em{font-style:normal;color:var(--green)}
  .cover .lede{font-size:17px;line-height:1.6;color:var(--ink2);max-width:46ch;margin:20px 0 0}
  .cover .lede b{color:var(--ink)}
  .rule4{height:5px;border-radius:99px;margin:40px 0 30px;
    background:linear-gradient(90deg,var(--red) 0 25%,var(--yellow) 25% 50%,var(--green) 50% 75%,var(--blue) 75% 100%)}
  .cmeta{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
  .cmeta>div{padding-right:18px}
  .cmeta span{display:block;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--mut2);margin-bottom:5px}
  .cmeta b{font-size:16px;font-weight:800;letter-spacing:-.01em}

  /* ── cabeçalho de seção ── */
  .sec-head{margin-bottom:30px}
  .sec-head .eyebrow{display:inline-flex;align-items:center;gap:8px}
  .sec-head .eyebrow::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--acc)}
  .sec-head h2{font-size:clamp(24px,3.4vw,32px);line-height:1.08;letter-spacing:-.03em;font-weight:800;
    margin:12px 0 0;max-width:20ch;text-wrap:balance}

  /* ── banda de números (sem caixinhas) ── */
  .stats{display:flex;flex-wrap:wrap;gap:0;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);margin:0 0 26px}
  .stats .stat{padding:18px 22px 18px 0;margin-right:22px;border-right:1px solid var(--hair);min-width:96px}
  .stats .stat:last-child{border-right:0;margin-right:0}
  .stats .stat span{display:block;font-size:11.5px;font-weight:700;color:var(--mut);margin-bottom:6px}
  .stats .stat b{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .stats .stat em{display:block;font-style:normal;font-size:11.5px;color:var(--mut2);margin-top:5px}
  .stats .hero{padding-left:0}
  .stats .hero b{font-size:44px;color:var(--acc)}
  .stats .hero span{color:var(--ink)}

  .narr{font-size:15px;line-height:1.72;color:var(--ink2);max-width:var(--measure);margin:0 0 30px}
  .narr b{color:var(--ink);font-weight:700}
  .narr .hl{background:linear-gradient(180deg,transparent 62%,var(--acc-w) 62%);padding:0 2px;font-weight:700;color:var(--ink)}

  /* ── layout 2 colunas ── */
  .two{display:grid;grid-template-columns:1.15fr .85fr;gap:38px;align-items:start}
  h3{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:0 0 14px}

  /* ── tabela ── */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--mut2);padding:0 8px 9px 0}
  th.n,td.n{text-align:right;font-variant-numeric:tabular-nums;padding-right:0}
  td{padding:8px 8px 8px 0;border-top:1px solid var(--hair);color:var(--ink2)}
  td:first-child{color:var(--ink);font-weight:600}
  tr:first-child td{border-top:1.5px solid var(--line)}
  .kw{position:relative}
  .kw i{position:absolute;left:0;bottom:-1px;height:2px;background:var(--acc);border-radius:2px}

  /* ── mini bar chart ── */
  .bars{display:flex;flex-direction:column;gap:11px}
  .brow{display:grid;grid-template-columns:60px 1fr 34px;align-items:center;gap:11px;font-size:12.5px}
  .brow .l{color:var(--mut);font-weight:600;text-align:right}
  .brow .t{height:9px;background:var(--hair);border-radius:99px;overflow:hidden}
  .brow .f{height:100%;border-radius:99px;background:var(--acc)}
  .brow .v{font-weight:800;font-variant-numeric:tabular-nums;text-align:right}
  .split{margin-top:22px}
  .split .cap{font-size:11.5px;color:var(--mut2);margin-top:12px;line-height:1.5}
  .cap{font-size:11.5px;color:var(--mut2);line-height:1.5}

  .sec-foot{display:flex;align-items:center;justify-content:space-between;margin-top:38px;padding-top:16px;border-top:1px solid var(--hair);font-size:11px;color:var(--mut2)}
  .sec-foot img{height:15px;opacity:.6;vertical-align:middle}

  /* ── fechamento ── */
  .close h2{font-size:clamp(26px,3.6vw,34px);letter-spacing:-.03em;line-height:1.1;font-weight:800;margin:0 0 6px;max-width:18ch}
  .bigstats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);margin:26px 0}
  .bigstats>div{padding:22px 22px 22px 0;border-right:1px solid var(--hair)}
  .bigstats>div:last-child{border-right:0}
  .bigstats span{display:block;font-size:11.5px;font-weight:700;color:var(--mut);margin-bottom:8px}
  .bigstats b{font-size:34px;font-weight:800;letter-spacing:-.025em}
  .bigstats em{display:block;font-style:normal;font-size:11.5px;color:var(--mut2);margin-top:6px}
  .sign{display:flex;align-items:center;gap:12px;margin-top:34px}
  .sign img{height:34px}
  .sign div{font-size:12.5px;color:var(--mut)}
  .sign b{color:var(--ink);display:block;font-size:13.5px}

  @media (max-width:720px){
    .doc{padding:0 12px 50px} .sheet{padding:30px 22px}
    .cmeta{grid-template-columns:1fr 1fr;gap:18px 0} .two{grid-template-columns:1fr;gap:30px}
    .bigstats{grid-template-columns:1fr;gap:0} .bigstats>div{border-right:0;border-top:1px solid var(--hair)}
    .bigstats>div:first-child{border-top:0}
    .stats .stat{padding-right:16px;margin-right:16px}
  }
  @media print{
    @page{size:A4;margin:13mm}
    body{background:#fff;font-size:11.5px}
    .bar{display:none} .doc{max-width:none;padding:0}
    .sheet{box-shadow:none;border:0;padding:0;margin:0;break-inside:avoid}
    .sheet+.sheet{page-break-before:always}
    .cover h1{font-size:38px} .stats .hero b{font-size:36px} .bigstats b{font-size:28px}
  }
</style>
</head>
<body>

<div class="bar">
  <img src="assets/logo-horizontal.png" alt="Maracatu Digital">
  <div class="ctl">
    <input type="month" id="mes" title="Mês do relatório">
    <button class="btn" id="pdf" onclick="window.print()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Baixar PDF
    </button>
  </div>
</div>

<div id="app"></div>

<script>
(function () {
  'use strict';
  var API = 'https://som-backend-production-01d8.up.railway.app/api';
  var LOGO_H = 'assets/logo-horizontal.png';
  var LOGO_S = 'assets/alvo.png';
  var app = document.getElementById('app');
  var mesInput = document.getElementById('mes');
  var qs = new URLSearchParams(location.search);
  var clienteId = qs.get('cliente') || '';
  var token = localStorage.getItem('som_token') || ''; // o app guarda o JWT cru

  // ── formatadores pt-BR ──
  function fInt(n) { return Number(n || 0).toLocaleString('pt-BR', { maximumFractionDigits: 0 }); }
  function fNum(n) { var v = Number(n || 0); return v.toLocaleString('pt-BR', { minimumFractionDigits: (v % 1 ? 1 : 0), maximumFractionDigits: 1 }); }
  function fMoney(n) {
    var v = Number(n || 0);
    if (v >= 1000) return 'R$ ' + v.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
    return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fPct(n) { return n == null ? '—' : Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%'; }
  function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  // narrativa da IA pode trazer <b>/<em>/<i> — todo o resto fica escapado
  function rico(s) {
    return esc(s).replace(/&lt;(\/?(?:b|em|i))&gt;/g, '<$1>');
  }
  var MES_CURTO = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
  function perCurto(ini, fim) {
    var a = ini.split('-'), b = fim.split('-');
    if (a[0] === b[0] && a[1] === b[1]) return a[2] + '–' + b[2] + ' ' + MES_CURTO[+a[1] - 1] + ' ' + a[0];
    return a[2] + ' ' + MES_CURTO[+a[1] - 1] + ' – ' + b[2] + ' ' + MES_CURTO[+b[1] - 1] + ' ' + b[0];
  }

  function estado(html) { app.innerHTML = '<div class="estado">' + html + '</div>'; }

  // barras horizontais: [{label, valor}] → linhas com largura relativa ao maior.
  // cores: mapa opcional label→var de cor (ex.: {Mulheres:'red', Homens:'blue'})
  function barras(itens, cores) {
    var max = 0; (itens || []).forEach(function (x) { if (x.valor > max) max = x.valor; });
    if (!max) return '';
    return (itens || []).map(function (x) {
      var w = Math.max(3, Math.round(x.valor / max * 100));
      var cor = cores && cores[x.label];
      var bg = cor ? ';background:var(--' + cor + ')' : '';
      return '<div class="brow"><span class="l">' + esc(x.label) + '</span><span class="t"><span class="f" style="width:' + w + '%' + bg + '"></span></span><span class="v num">' + fNum(x.valor) + '</span></div>';
    }).join('');
  }
  var COR_GENERO = { Mulheres: 'red', Homens: 'blue' };

  function render(d) {
    document.title = 'Relatório de Mídia · ' + d.cliente.nome + ' — ' + d.periodoLabel;
    var n = d.narrativa || {};
    var g = d.google, m = d.meta, t = d.totais;
    var per = perCurto(d.ini, d.fim);
    var canais = [g && 'Google', m && 'Meta'].filter(Boolean).join(' · ') || '—';
    var html = '<div class="doc">';

    // ══ CAPA ══
    var titulo = n.titulo || ('O mês de ' + esc(d.periodoLabel) + ' em <em>números reais</em>.');
    var lede = n.lede || ('A <b>' + esc(d.cliente.nome) + '</b> gerou <b>' + fNum(t.contatos) + ' contatos</b> no período, com investimento total de <b>' + fMoney(t.investimento) + '</b>' + (t.custoContato ? ' — <b>' + fMoney(t.custoContato) + '</b> por contato' : '') + '.');
    html += '<section class="sheet cover">' +
      '<img class="logo" src="' + LOGO_H + '" alt="Maracatu Digital">' +
      '<div class="eyebrow">Relatório de mídia paga</div>' +
      '<h1>' + rico(titulo) + '</h1>' +
      '<p class="lede">' + rico(lede) + '</p>' +
      '<div class="rule4"></div>' +
      '<div class="cmeta">' +
        '<div><span>Cliente</span><b>' + esc(d.cliente.nome) + '</b></div>' +
        '<div><span>Período</span><b>' + esc(per) + '</b></div>' +
        '<div><span>Canais</span><b>' + esc(canais) + '</b></div>' +
        '<div><span>Investimento</span><b>' + fMoney(t.investimento) + '</b></div>' +
      '</div></section>';

    var rodape = '<div class="sec-foot"><span><img src="' + LOGO_H + '"> · Relatório de mídia</span><span>' + esc(d.cliente.nome) + ' · ' + esc(d.periodoLabel) + '</span></div>';

    // ══ GOOGLE ADS ══
    if (g) {
      var gr = g.resumo;
      var narrG = n.narrGoogle || ('As buscas no Google levaram <span class="hl">' + fInt(gr.cliques) + ' visitas</span> ao site no período. Foram <b>' + fNum(gr.leads) + ' contatos</b>' + (gr.custoLead ? ' a <b>' + fMoney(gr.custoLead) + '</b> cada' : '') + ', com investimento de <b>' + fMoney(gr.gasto) + '</b>.');
      var termos = (g.termos || []);
      var maxCli = 0; termos.forEach(function (x) { if (x.cliques > maxCli) maxCli = x.cliques; });
      var linhas = termos.slice(0, 6).map(function (x) {
        var w = maxCli ? Math.max(3, Math.round(x.cliques / maxCli * 100)) : 0;
        return '<tr><td class="kw">' + esc(x.termo) + '<i style="width:' + w + '%"></i></td><td class="n num">' + fInt(x.cliques) + '</td><td class="n num">' + fNum(x.conversoes) + '</td><td class="n num">' + fMoney(x.custo) + '</td></tr>';
      }).join('');
      var demoG = g.demografia || {};
      var idadeG = (demoG.idade || []).map(function (x) { return { label: x.label, valor: (x.conversoes || 0) || x.cliques }; }).slice(0, 5);
      var genG = (demoG.genero || []).map(function (x) { return { label: x.label, valor: (x.conversoes || 0) || x.cliques }; });
      var usaConv = (demoG.idade || []).some(function (x) { return x.conversoes > 0; });
      html += '<section class="sheet" style="--acc:var(--blue);--acc-w:var(--blue-w)">' +
        '<div class="sec-head"><span class="eyebrow">Google Ads · Rede de Pesquisa</span>' +
        '<h2>' + rico(n.tituloGoogle || 'Quem estava procurando, encontrou.') + '</h2></div>' +
        '<div class="stats">' +
          '<div class="stat hero"><span>Contatos</span><b class="num">' + fNum(gr.leads) + '</b>' + (gr.custoLead ? '<em>a ' + fMoney(gr.custoLead) + ' cada</em>' : '') + '</div>' +
          '<div class="stat"><span>Cliques</span><b class="num">' + fInt(gr.cliques) + '</b></div>' +
          '<div class="stat"><span>Impressões</span><b class="num">' + fInt(gr.impressoes) + '</b></div>' +
          '<div class="stat"><span>CTR</span><b class="num">' + fPct(gr.ctr) + '</b></div>' +
          '<div class="stat"><span>Investido</span><b class="num">' + fMoney(gr.gasto) + '</b></div>' +
        '</div>' +
        '<p class="narr">' + rico(narrG) + '</p>' +
        '<div class="two"><div>' +
          (linhas ? '<h3>Palavras-chave que converteram</h3><table><tr><th>Termo buscado</th><th class="n">Cliques</th><th class="n">Contatos</th><th class="n">Custo</th></tr>' + linhas + '</table>'
                  : '<h3>Campanhas</h3><table><tr><th>Campanha</th><th class="n">Cliques</th><th class="n">Contatos</th><th class="n">Custo</th></tr>' +
                    (gr.campanhas || []).slice(0, 6).map(function (c) { return '<tr><td>' + esc(c.nome) + '</td><td class="n num">' + fInt(c.cliques) + '</td><td class="n num">' + fNum(c.conversoes) + '</td><td class="n num">' + fMoney(c.gasto) + '</td></tr>'; }).join('') + '</table>') +
        '</div><div>' +
          (idadeG.length ? '<h3>' + (usaConv ? 'Quem converteu' : 'Quem clicou') + '</h3><div class="bars">' + barras(idadeG) + '</div>' : '') +
          (genG.length ? '<div class="split"><div class="bars">' + barras(genG, COR_GENERO) + '</div></div>' : '') +
        '</div></div>' + rodape + '</section>';
    }

    // ══ META ADS ══
    if (m) {
      var mr = m.resumo;
      var heroLabel = mr.conversas > 0 ? 'Conversas' : 'Contatos';
      var heroVal = mr.conversas > 0 ? mr.conversas : mr.leads;
      var heroEm = mr.conversas > 0 ? 'iniciadas no WhatsApp' : (mr.custoConversa ? '' : 'gerados nos anúncios');
      var narrM = n.narrMeta || ('Os anúncios alcançaram <span class="hl">' + fInt(mr.alcance) + ' pessoas</span> com ' + fInt(mr.impressoes) + ' impressões e ' + fInt(mr.cliques) + ' cliques. Com <b>' + fMoney(mr.gasto) + '</b>, geraram <b>' + fNum(heroVal) + ' ' + heroLabel.toLowerCase() + '</b>.');
      var plat = (m.plataformas || []).filter(function (p) { return p.gasto > 0 || p.cliques > 0; });
      var maxPlat = 0; plat.forEach(function (p) { if (p.cliques > maxPlat) maxPlat = p.cliques; });
      var CORPLAT = { Instagram: 'red', Facebook: 'blue', Messenger: 'green', 'Audience Network': 'yellow' };
      var linhasP = plat.map(function (p) {
        var cor = CORPLAT[p.plataforma] || 'green';
        var w = maxPlat ? Math.max(3, Math.round(p.cliques / maxPlat * 100)) : 0;
        return '<tr><td class="kw" style="color:var(--' + cor + ')">' + esc(p.plataforma) + '<i style="width:' + w + '%;background:var(--' + cor + ')"></i></td><td class="n num">' + fInt(p.cliques) + '</td><td class="n num">' + fInt(p.alcance) + '</td><td class="n num">' + fMoney(p.gasto) + '</td></tr>';
      }).join('');
      var demoM = m.demografia || {};
      var idadeM = (demoM.idade || []).slice(0, 5);
      var genM = (demoM.genero || []);
      html += '<section class="sheet" style="--acc:var(--green);--acc-w:var(--green-w)">' +
        '<div class="sec-head"><span class="eyebrow">Meta Ads · Instagram + Facebook</span>' +
        '<h2>' + rico(n.tituloMeta || 'Presença onde o público passa o dia.') + '</h2></div>' +
        '<div class="stats">' +
          '<div class="stat hero"><span>' + heroLabel + '</span><b class="num">' + fNum(heroVal) + '</b>' + (heroEm ? '<em>' + heroEm + '</em>' : '') + '</div>' +
          '<div class="stat"><span>Alcance</span><b class="num">' + fInt(mr.alcance) + '</b></div>' +
          '<div class="stat"><span>Cliques</span><b class="num">' + fInt(mr.cliques) + '</b></div>' +
          '<div class="stat"><span>CTR</span><b class="num">' + fPct(mr.ctr) + '</b></div>' +
          '<div class="stat"><span>Investido</span><b class="num">' + fMoney(mr.gasto) + '</b></div>' +
        '</div>' +
        '<p class="narr">' + rico(narrM) + '</p>' +
        '<div class="two"><div>' +
          (linhasP ? '<h3>Onde os anúncios apareceram</h3><table><tr><th>Plataforma</th><th class="n">Cliques</th><th class="n">Alcance</th><th class="n">Investido</th></tr>' + linhasP + '</table>' : '') +
          (mr.frequencia ? '<div class="cap" style="margin-top:16px">A frequência de <b>' + fNum(mr.frequencia) + '</b> mostra quantas vezes, em média, cada pessoa viu o anúncio.</div>' : '') +
        '</div><div>' +
          (idadeM.length ? '<h3>' + (mr.conversas > 0 ? 'De onde vieram as conversas' : 'Quem respondeu aos anúncios') + '</h3><div class="bars">' + barras(idadeM) + '</div>' : '') +
          (genM.length ? '<div class="split"><div class="bars">' + barras(genM, COR_GENERO) + '</div></div>' : '') +
        '</div></div>' + rodape + '</section>';
    }

    // ══ FECHAMENTO ══
    var partes = [];
    if (g) partes.push(fNum(t.contatosGoogle) + ' Google');
    if (m) partes.push(fNum(t.contatosMeta) + ' Meta');
    var fech = n.fechamento || ('O período fechou com <b>' + fNum(t.contatos) + ' contatos</b> gerados por <b>' + fMoney(t.investimento) + '</b> investidos' + (t.custoContato ? ' — ' + fMoney(t.custoContato) + ' por contato' : '') + '.');
    html += '<section class="sheet close">' +
      '<div class="eyebrow" style="color:var(--mut)">O mês em uma linha</div>' +
      '<h2>' + rico(n.tituloFechamento || 'Resultado entregue, custo sob controle.') + '</h2>' +
      '<div class="bigstats">' +
        '<div><span>Investimento total</span><b class="num">' + fMoney(t.investimento) + '</b><em>' + esc(canais) + '</em></div>' +
        '<div><span>Contatos gerados</span><b class="num">' + fNum(t.contatos) + '</b><em>' + esc(partes.join(' · ')) + '</em></div>' +
        '<div><span>Custo por contato</span><b class="num">' + (t.custoContato ? fMoney(t.custoContato) : '—') + '</b><em>média do período</em></div>' +
      '</div>' +
      '<p class="narr" style="max-width:64ch">' + rico(fech) + '</p>' +
      '<div class="sign"><img src="' + LOGO_S + '" alt="">' +
      '<div><b>Equipe Maracatu Digital</b>maracatumktdigital.com · relatório gerado pelo SOM</div></div>' +
      '</section>';

    html += '</div>';
    app.innerHTML = html;
    document.getElementById('pdf').disabled = false;
  }

  function carregar() {
    var mes = mesInput.value; // YYYY-MM
    var q = '';
    if (mes) {
      var y = +mes.split('-')[0], mo = +mes.split('-')[1];
      var fim = new Date(Date.UTC(y, mo, 0)).toISOString().slice(0, 10);
      q = '?ini=' + mes + '-01&fim=' + fim;
    }
    document.getElementById('pdf').disabled = true;
    estado('<div class="spin"></div><b>Gerando o relatório…</b>Puxando Google Ads e Meta Ads e escrevendo a leitura do mês. Leva menos de um minuto.');
    fetch(API + '/relatorios/midia/' + encodeURIComponent(clienteId) + q, {
      headers: { Authorization: 'Bearer ' + token },
    }).then(function (r) {
      if (r.status === 401) throw new Error('login');
      if (!r.ok) return r.json().catch(function () { return {}; }).then(function (j) { throw new Error(j.message || ('HTTP ' + r.status)); });
      return r.json();
    }).then(function (d) {
      if (!d.google && !d.meta) {
        estado('<b>' + esc(d.cliente ? d.cliente.nome : 'Cliente') + ' ainda não tem conta de anúncio vinculada.</b>Vincule o Customer ID do Google Ads e/ou a conta Meta na ficha do cliente e gere de novo.');
        return;
      }
      render(d);
    }).catch(function (e) {
      if (e.message === 'login') estado('<b>Sessão expirada.</b>Abra o <a href="index.html">SOM</a>, faça login e clique em Gerar relatório de novo.');
      else estado('<b>Não consegui gerar o relatório.</b>' + esc(e.message || e) + '<br><br><button class="btn" onclick="location.reload()">Tentar de novo</button>');
    });
  }

  // mês padrão: o que veio na URL (?ini=) ou o mês passado fechado
  (function initMes() {
    var ini = qs.get('ini');
    if (ini && /^\d{4}-\d{2}/.test(ini)) { mesInput.value = ini.slice(0, 7); return; }
    var d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - 1);
    mesInput.value = d.toISOString().slice(0, 7);
  })();
  mesInput.addEventListener('change', carregar);

  if (!clienteId) { estado('<b>Falta o cliente.</b>Abra esta página pelo botão <b>Gerar relatório</b> na ficha do cliente no SOM.'); return; }
  if (!token) { estado('<b>Você não está logado.</b>Abra o <a href="index.html">SOM</a>, faça login e clique em Gerar relatório de novo.'); return; }
  carregar();
})();
</script>
</body>
</html>
